[config.site]
title = "Carlomio's Blog"
description = "Carlomio 的个人博客 — 学习记录、技术总结与知识点沉淀"
pageTitle = "Carlomio's Blog | 个人技术博客"
pageDescription = "记录学习、总结技术、沉淀知识"
repository = "https://github.com/dodolalorc/astro-navfolio"
footerNote = "Built with Astro & Navfolio."

[config.vibe]
showTrail = true

[config.theme]
# Available palettes:
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "green-soft"

[config.code]
lightTheme = "catppuccin-latte"
darkTheme = "catppuccin-macchiato"
lineNumbers = true
wrap = true
preserveIndent = true
collapseStyle = "collapsible-auto"

[config.comments]
enabled = false
provider = "giscus"
show_on_posts = true

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "Search notes..."
maxResults = 6

[config.blog]
postsPerPage = 6

[config.comments.giscus]
repo = "dodolalorc/astro-navfolio"
repo_id = "R_kgDOSaQejw"
category = "Announcements"
category_id = "DIC_kwDOSaQej84C9di9"
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
light_theme = "light"
dark_theme = "dark"
lang = "zh-CN"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "zh-CN"
dark = "html.dark"
pageview = true
comment = true

[config.profile]
name = "Carlomio"
handle = "@carlomio"
role = "Developer & Learner"
company = ""
location = ""
meta = "学习记录 · 技术总结 · 知识沉淀"
avatar = "/images/logo.png"

[[config.topNav.links]]
label = "Home"
href = "/"

[[config.topNav.links]]
label = "Blog"
href = "/blog"

[[config.topNav.links]]
label = "Projects"
href = "/projects"

[[config.topNav.links]]
label = "Vibe"
href = "/vibe"

[[config.topNav.links]]
label = "About"
href = "/about"

